; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
; Enable the OPI PSRAM required for the XIAO ESP32 S3 Sense
board_build.arduino.memory_type = qio_opi
build_flags = 
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue


; Run the models from Edge Impulse
[env:audio_inference]
build_src_filter = +<*> -<record_audio.cpp> -<record_image.cpp> -<save_data.cpp>

; Record audio
[env:record_audio]
build_src_filter = +<*> -<audio_inference.cpp> -<record_image.cpp> -<save_data.cpp>

; Record image
[env:record_image]
build_src_filter = +<*> -<audio_inference.cpp> -<record_audio.cpp> -<save_data.cpp>

; Configure the board for storage mode, which allows the board to be used as a USB mass storage device to copy files to and from the PSRAM
[env:save_data]
build_src_filter = +<*> -<audio_inference.cpp> -<record_audio.cpp> -<record_image.cpp>
